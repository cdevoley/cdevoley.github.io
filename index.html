<!--
=============================================================================
  INTERACTIVE RESUME — USER GUIDE
=============================================================================

  HOW TO UPDATE THIS RESUME
  --------------------------
  All content is stored in a YAML block embedded in this file.
  You do NOT need a web server — just open index.html in any browser.

  FIND THE DATA
  -------------
  Search for '<script type="text/yaml"' to jump straight to the data block.
  It has four sections:

    1. candidate
       Personal info displayed in the sidebar and hero. Fields:
         name        - displayed as the large heading        (required)
         description - subtitle shown below the name        (required)
         email       - if present, shows an Email link
         linkedin    - if present, shows a LinkedIn link
         github      - if present, shows a GitHub link
         blog        - if present, shows a Blog link
       Omit or leave blank any of email / linkedin / github / blog to hide that link.

    2. default_theme
       Sets the initial color scheme when the page first loads.
         default_theme: light  — start in light mode (default if omitted)
         default_theme: dark   — start in dark mode
       The user can still toggle between modes at any time with the
       button in the top-right corner.

    3. show_demos
       Controls whether the "View Demos" button appears in the sidebar.
         show_demos: true    — button is visible (default)
         show_demos: false   — button is hidden
       NOTE: The button links to demos.html. That file must exist in the same
       folder as index.html for the link to work.

    4. show_headshot
       Controls whether the headshot circle appears in the sidebar.
         show_headshot: true   — circle is visible (default)
         show_headshot: false  — circle is hidden
       NOTE: Requires "headshot.jpg" or "headshot.png" in the same folder as
       index.html. If show_headshot is true but no file is found, the circle
       will display a prompt to add the file.

    5. experience
       A list of jobs shown in the carousel. Each entry has:
         id          - unique key that links to the projects section (e.g. "job0")
                       Keep this stable — changing it breaks the project link.
         title       - job title
         company     - employer name
         period      - date range (e.g. "2022 – Present")
         description - one-sentence summary shown on the carousel card

       To ADD a job:    append a new entry and add a matching key under projects.
       To REMOVE a job: delete the entry and its matching key under projects.
       To REORDER jobs: move the entries freely — order on the page follows
                        the order in this list.

    5. projects
       A map of job id → list of project cards.
       Each project has:
         title - project name shown on the card
         cat   - category label; drives the filter buttons automatically
         desc  - full description shown in the popup when a card is clicked

  TIPS
  ----
  - The carousel card background glow cycles automatically — no changes needed
    when adding or removing jobs.
  - Project cards open a detail popup on click; no length limit on desc.
  - The sidebar nav lists all jobs and can be clicked to jump between them.
  - Light/dark mode toggle is the button in the top-right corner.

=============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chad Devoley — IT Systems Administrator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3f0;--surface:#eae9e6;--card:#ffffff;--card2:#f0eff0;
  --border:#dddcda;--border2:#cccac7;
  --t1:#0f0f12;--t2:#5a5963;--t3:#a09fa8;
  --gold:#2d7a4f;--gold-dim:rgba(45,122,79,.1);--gold-glow:rgba(45,122,79,.2);
  --bg-glow:rgba(45,122,79,.07);
  --red:#e05c5c;--sw:270px;
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg) radial-gradient(ellipse 55vw 70vh at 95% 35%,var(--bg-glow),transparent 65%) fixed no-repeat;color:var(--t1);min-height:100vh;overflow-x:hidden}
.layout{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:var(--sw);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-top{padding:36px 28px 28px;border-bottom:1px solid var(--border);position:relative}
.sb-top::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent)}
.avatar{width:160px;height:160px;border-radius:50%;margin-bottom:14px;box-shadow:0 0 0 2px var(--surface),0 0 0 3px var(--gold);overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
/* avatar states — toggled with CSS classes instead of inline styles */
.avatar.hidden{display:none}
.avatar.placeholder{display:flex;align-items:center;justify-content:center;text-align:center;padding:12px}
.avatar-hint{font-size:.65rem;line-height:1.4;color:var(--t3)}
.sb-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.07em;line-height:1.1}
.sb-role{font-size:.68rem;font-weight:500;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;margin-top:4px}
.sb-links{display:flex;flex-direction:column;gap:5px;margin-top:18px}
.sb-link{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;font-size:.72rem;color:var(--t2);text-decoration:none;border:1px solid transparent;transition:all .2s}
.sb-link:hover{color:var(--gold);background:var(--gold-dim);border-color:var(--gold-glow)}
.sb-link svg{flex-shrink:0;opacity:.55;aria-hidden:true}
.sb-link:hover svg{opacity:1}
.sb-nav{flex:1;padding:22px 0}
.nav-lbl{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--t3);padding:0 28px;margin-bottom:6px}
/* nav-item is now a <button> — reset default button styles */
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 28px;width:100%;font-size:.78rem;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--t2);background:transparent;border:none;cursor:pointer;transition:all .2s;position:relative;text-align:left}
.nav-item::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:0;background:var(--gold);transition:height .2s;border-radius:0 2px 2px 0}
.nav-item:hover{color:var(--t1)}
.nav-item:hover::before{height:55%}
.nav-item.active{color:var(--gold)}
.nav-item.active::before{height:65%}
.nav-item:focus-visible{outline:2px solid var(--gold);outline-offset:-2px}
.nav-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.5}
.nav-item.active .nav-dot{opacity:1}
.nav-job-title{display:block;font-size:.78rem;font-weight:500;line-height:1.1}
.nav-company{display:block;font-size:.68rem;font-weight:400;color:var(--t3);line-height:1.1}
.sb-bottom{padding:18px 28px;border-top:1px solid var(--border);margin-top:24px}
/* sb-bottom visibility controlled by HTML hidden attribute, not inline style */
.theme-toggle{position:fixed;top:16px;right:20px;z-index:200;width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.theme-toggle:hover{border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px var(--gold-glow)}
.theme-toggle:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
body.dark{--bg:#0d0d0f;--surface:#131316;--card:#18181d;--card2:#1e1e25;--border:#28282f;--border2:#33333c;--t1:#f0eeea;--t2:#95949e;--t3:#52515a;--gold:#5ab87a;--gold-dim:rgba(90,184,122,.13);--gold-glow:rgba(90,184,122,.22);--bg-glow:rgba(90,184,122,.14)}
.demos-pill{display:flex;align-items:center;justify-content:center;gap:7px;padding:8px 14px;background:linear-gradient(135deg,rgba(45,122,79,.1),rgba(45,122,79,.05));border:1px solid rgba(45,122,79,.28);border-radius:6px;font-size:.72rem;font-weight:600;color:var(--gold);text-decoration:none;text-transform:uppercase;letter-spacing:.1em;transition:all .2s}
.demos-pill:hover{background:var(--gold-dim);border-color:var(--gold);box-shadow:0 0 18px var(--gold-glow)}
.demos-pill:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@keyframes shake{0%,100%{transform:translateX(0)}10%{transform:translateX(-4px) rotate(-1deg)}20%{transform:translateX(4px) rotate(1deg)}30%{transform:translateX(-4px) rotate(-1deg)}40%{transform:translateX(4px) rotate(1deg)}50%{transform:translateX(-2px)}60%{transform:translateX(2px)}70%,90%{transform:translateX(0)}}
.demos-pill.shaking{animation:shake .6s ease}
/* MAIN */
.main{flex:1;min-width:0;padding:48px 52px;max-width:1500px}
/* HERO */
.hero{margin-bottom:56px;max-width:1040px}
.hero-eye{display:flex;align-items:center;gap:10px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.17em;color:var(--gold);margin-bottom:10px}
.hero-eye::before{content:'';width:24px;height:1px;background:var(--gold)}
.hero-wrap{position:relative;display:inline-block}
.hero-ghost{position:absolute;top:3px;left:3px;font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,5.8rem);line-height:.92;letter-spacing:.03em;color:transparent;-webkit-text-stroke:1px rgba(45,122,79,.1);pointer-events:none}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,5.8rem);line-height:.92;letter-spacing:.03em;color:var(--t1)}
.hero-desc{margin-top:18px;font-size:.95rem;font-weight:300;color:var(--t2);display:flex;align-items:center}
.hero-line{display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin-right:12px;flex-shrink:0}
/* SECTION */
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:24px}
.sec-num{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--gold);opacity:.7}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.06em;color:var(--t1)}
.sec-rule{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
/* CAROUSEL WRAP + BADGE (shared) */
.carousel-wrap{margin-bottom:56px;max-width:1040px}
.badge{display:inline-block;font-family:'DM Mono',monospace;font-size:.66rem;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(45,122,79,.2);padding:2px 10px;border-radius:2px;letter-spacing:.08em;margin-bottom:12px}
/* EXPERIENCE EXPANDABLE CARDS */
.exp-list{display:flex;flex-direction:column;gap:14px}
.exp-card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:2px;padding:28px 36px;overflow:hidden;cursor:pointer;transition:all .2s}
.exp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent 60%);opacity:0;transition:opacity .2s}
.exp-card:hover::before,.exp-card.expanded::before{opacity:1}
.exp-card:hover{border-color:var(--border2)}
.exp-card:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.exp-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.exp-toggle{font-size:.7rem;color:var(--t3);transition:transform .2s;flex-shrink:0;margin-top:4px}
.exp-card.expanded .exp-toggle{transform:rotate(180deg)}
.exp-body{max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .2s ease;opacity:0}
.exp-card.expanded .exp-body{max-height:800px;opacity:1}
.exp-projects{margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.exp-proj-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:10px}
.c-title{font-size:1.32rem;font-weight:600;letter-spacing:-.01em}
.c-company{font-size:.78rem;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.c-desc{margin-top:14px;font-size:.92rem;font-weight:300;color:var(--t2);line-height:1.75}
/* PROJECTS */
.proj-wrap{margin-bottom:40px}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px}
.f-btn{padding:4px 13px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--t3);font-size:.7rem;font-weight:600;font-family:'DM Sans',sans-serif;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.f-btn:hover{border-color:var(--gold);color:var(--gold)}
.f-btn.on{background:var(--gold);color:#0d0d0f;border-color:var(--gold)}
.f-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:22px 22px 18px;cursor:pointer;position:relative;min-height:108px;transition:all .2s;overflow:hidden}
.proj-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .3s ease}
.proj-card:hover{background:var(--card2);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.4)}
.proj-card:hover::after{width:100%}
.proj-card:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.proj-cat{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);margin-bottom:9px}
.proj-name{font-size:.92rem;font-weight:500;color:var(--t1);line-height:1.4}
.proj-arrow{position:absolute;bottom:12px;right:14px;font-size:.72rem;color:var(--gold);opacity:0;transform:translateX(-4px);transition:all .2s}
.proj-card:hover .proj-arrow{opacity:1;transform:translateX(0)}
/* PROJECT EXPANDABLE BODY */
.proj-body{max-height:0;overflow:hidden;transition:max-height .3s ease,opacity .2s ease,margin .2s ease;opacity:0;margin-top:0}
.proj-card.expanded .proj-body{max-height:360px;opacity:1;margin-top:12px}
.proj-body-desc{font-size:.88rem;font-weight:300;color:var(--t2);line-height:1.7}
.proj-body-link{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:5px 12px;border-radius:2px;border:1px solid var(--gold-glow);background:var(--gold-dim);color:var(--gold);font-size:.72rem;font-weight:600;text-decoration:none;text-transform:uppercase;letter-spacing:.1em;transition:all .2s}
.proj-body-link:hover{background:var(--gold);color:#0d0d0f;border-color:var(--gold)}
.proj-body-link:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.proj-card.expanded{background:var(--card2);border-color:var(--border2)}
.proj-card.expanded::after{width:100%}
/* ANIM */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.au{animation:fadeUp .5s ease both}
.au1{animation-delay:.05s}.au2{animation-delay:.15s}.au3{animation-delay:.25s}
/* Respect reduced-motion preference */
@media(prefers-reduced-motion:reduce){
  .au{animation:none}
  .exp-card,.exp-card::before,.exp-body,.exp-toggle,.proj-body,.f-btn,.proj-card,.proj-card::after,.proj-arrow,.proj-body-link,.sb-link,.demos-pill,.nav-item::before,.nav-item,.theme-toggle{transition:none}
  .demos-pill.shaking{animation:none}
}
/* MOBILE */
@media(max-width:720px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border)}
  .sb-nav{display:none}
  .main{padding:28px 20px}
}
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode">🌙</button>
<div class="layout">
  <aside class="sidebar" aria-label="Navigation sidebar">
    <div class="sb-top">
      <!-- avatar visibility set via CSS class in JS, not inline style -->
      <div class="avatar" id="sb-avatar" role="img" aria-label="Profile photo"></div>
      <div class="sb-links" id="sb-links" aria-label="Contact links"></div>
      <!-- hidden attribute used instead of style="display:none" -->
      <div id="sb-bottom" hidden>
        <a href="demos.html" class="demos-pill">✦ View Demos</a>
      </div>
    </div>
    <nav class="sb-nav" aria-label="Experience navigation">
      <div class="nav-lbl" aria-hidden="true">Experience</div>
      <!-- role="list" restores list semantics when CSS list-style is removed -->
      <div id="sb-nav-items" role="list"></div>
    </nav>
  </aside>
  <main class="main">
    <div class="hero au au1">
      <div class="hero-wrap">
        <!-- decorative shadow duplicate — hidden from assistive tech -->
        <div class="hero-ghost" id="hero-ghost" aria-hidden="true"></div>
        <h1 class="hero-name" id="hero-name"></h1>
      </div>
      <p class="hero-desc">
        <span class="hero-line" aria-hidden="true"></span>
        <span id="hero-desc"></span>
      </p>
    </div>
    <div class="carousel-wrap au au2">
      <div class="sec-head">
        <span class="sec-num" aria-hidden="true">01</span>
        <h2 class="sec-title">Experience</h2>
        <div class="sec-rule" aria-hidden="true"></div>
      </div>
      <div class="exp-list" id="exp-list" role="list" aria-label="Experience"></div>
    </div>
    <div class="proj-wrap au au3">
      <div class="sec-head">
        <span class="sec-num" aria-hidden="true">02</span>
        <h2 class="sec-title">Featured Projects</h2>
        <div class="sec-rule" aria-hidden="true"></div>
      </div>
      <!-- filter-bar labelled as a group of filter controls -->
      <div class="filter-bar" id="filter-bar" role="group" aria-label="Filter projects by category"></div>
      <div class="proj-grid" id="proj-grid" aria-label="Project cards"></div>
    </div>
  </main>
</div>

     RESUME DATA — edit this YAML block to update all resume content
     ═══════════════════════════════════════════════════════════════════════ -->
<script type="text/yaml" id="resume-data">
# Candidate info — name and description are required; contact links are optional.
# Omit (or leave blank) any of email, linkedin, github, or blog to hide that link.
candidate:
  name: "Chad Devoley"
  description: "IT Systems Administrator"
  email: "cdevoley@gmail.com"
  linkedin: "https://www.linkedin.com/in/chad-d-53601966/"

# Initial color scheme: "light" (default) or "dark"

experience:

  - id: "job1"
    title: "Lead IT Systems Analyst"

projects:

    - title: "Phoenix AI Agent Platform"
      cat: "AI & Automation"
      desc: "Designed and deployed an internal AI agent platform (Phoenix) to automate repetitive IT workflows — from access provisioning to incident triage — reducing manual task volume and improving SLA adherence across the IT org."
    - title: "AI Helpdesk Automation"
      cat: "AI & Automation"
      desc: "Built an AI-powered helpdesk automation layer that handles tier-1 ticket classification, routing, and first-response drafting using LLM integrations, cutting mean time-to-first-response and freeing the IT team for higher-complexity work."
      url: "https://github.com/cdevoley/helpdesk-triage-agent"
    - title: "Production MCP Servers & Slack Bots"
      cat: "AI & Automation"
      desc: "Developed and shipped production-grade MCP (Model Context Protocol) servers and Slack bots that give IT and engineering teams conversational access to internal tooling — enabling actions like device lookups, access requests, and ticket creation directly from Slack."
    - title: "Okta Administration at Scale"
      cat: "Identity & Access"
      desc: "Administered Okta SSO and lifecycle management for the full org, maintaining application integrations, enforcing MFA policies, and managing group-based provisioning to ensure secure, consistent access across all SaaS platforms."
    - title: "Endpoint Fleet Management"
      cat: "Infrastructure"
      desc: "Managed the macOS and Windows endpoint fleet using MDM tooling, overseeing device enrollment, configuration profiles, OS patching schedules, and compliance reporting to maintain a secure and auditable device estate."

  job1:
    - title: "Tier 1–3 Engineering Support"
      cat: "ITSM"
      desc: "Delivered full-spectrum IT support to HomeLight's engineering organization across tier 1-3 escalations — resolving hardware, software, network, and identity issues while maintaining SLA targets and minimizing engineer downtime."
    - title: "Google Workspace & Entra ID Admin"
      cat: "Identity & Access"
      desc: "Administered Google Workspace and Microsoft Entra ID (Azure AD) as the dual identity backbone for the organization, managing user provisioning, group policies, directory sync, and security configurations across both platforms."
    - title: "RBAC & Lifecycle Automation"
      cat: "Identity & Access"
      desc: "Designed and implemented role-based access control (RBAC) policies and automated the full employee lifecycle — from onboarding provisioning to offboarding deprovisioning — eliminating manual steps and reducing access-related risk."
    - title: "IT Self-Service Wiki"
      cat: "ITSM"
      desc: "Built and maintained a comprehensive IT self-service knowledge base covering common issues, how-to guides, and request workflows, enabling employees to resolve tier-1 issues independently and reducing inbound ticket volume."
    - title: "UniFi Network Infrastructure"
      cat: "Infrastructure"
      desc: "Managed and maintained the office network infrastructure on Ubiquiti UniFi, handling VLAN segmentation, wireless AP configuration, switch management, and network performance monitoring to ensure reliable connectivity for all staff."

  job2:
    - title: "Vendor & Asset Management"
      cat: "ITSM"
      desc: "Owned IT vendor relationships and the full asset management lifecycle — from procurement and inventory tracking to refresh planning and disposal — keeping hardware spend predictable and the asset register audit-ready at all times."
    - title: "Conference Room AV & Exec Support"
      cat: "ITSM"
      desc: "Managed all conference room AV infrastructure and provided white-glove IT support for executives, ensuring reliable video conferencing setups, rapid incident response, and a seamless experience for high-visibility meetings and all-hands events."
    - title: "Support Queue Operations"
      cat: "ITSM"
      desc: "Ran day-to-day IT support queue operations, triaging and resolving tickets across hardware, software, access, and connectivity categories while maintaining queue health, SLA compliance, and clear communication with end users."
    - title: "97% First-Call Resolution"
      cat: "Leadership"
      desc: "Achieved and sustained a 97% first-call resolution rate across the IT support function — a result of building deep technical breadth, maintaining thorough runbooks, and investing in proactive user education to reduce repeat incidents."
    - title: "Active Directory Administration"
      cat: "Identity & Access"
      desc: "Administered Active Directory for ZipRecruiter's corporate environment, managing OUs, Group Policy Objects, security groups, and user account lifecycle to maintain a secure, well-structured directory aligned with compliance requirements."

  job3:
    - title: "RBAC Documentation & Provisioning"
      cat: "Identity & Access"
      desc: "Designed and documented the role-based access control (RBAC) framework for all internal systems, establishing clear provisioning procedures and access matrices that became the baseline for onboarding and audit processes."
    - title: "Hyper-V Network Administration"
      cat: "Infrastructure"
      desc: "Administered the Hyper-V virtual infrastructure, managing virtual switches, VM networking, and host configuration to deliver a stable and segmented virtual environment supporting all internal workloads."
    - title: "Sole IT Help Desk"
      cat: "ITSM"
      desc: "Operated as the sole IT resource for the entire company, handling all support requests, hardware issues, software licensing, and vendor coordination — building scalable processes to manage demand efficiently as a team of one."
    - title: "Hardware & Software Lifecycle"
      cat: "ITSM"
      desc: "Managed the end-to-end hardware and software lifecycle from procurement through deployment, maintenance, and retirement — ensuring all assets were tracked, licensed, patched, and refreshed on schedule."
    - title: "Cisco Meraki Network Admin"
      cat: "Infrastructure"
      desc: "Administered the Cisco Meraki network stack including switching, wireless access points, and security appliances, configuring VLANs, firewall rules, and client policies to maintain a secure and performant office network."
</script>

<script>
(function () {
'use strict';

/* ── SECURITY HELPERS ── */

// Allows only safe URL schemes — blocks javascript:, data:, vbscript:, etc.
function safeUrl(url) {
  const s = String(url ?? '').trim();
  return /^(https?:\/\/|mailto:)/i.test(s) ? s : '';
}

/* ── PARSE RESUME DATA ── */

// All data is scoped inside the IIFE — nothing written to window.
let D;
try {
  const raw    = document.getElementById('resume-data').textContent;
  const parsed = jsyaml.load(raw);
  const c      = parsed.candidate ?? {};
  D = {
    candidate: {
      name:        String(c.name        ?? ''),
      description: String(c.description ?? ''),
      email:       String(c.email       ?? ''),
      linkedin:    String(c.linkedin    ?? ''),
      github:      String(c.github      ?? ''),
      blog:        String(c.blog        ?? ''),
    },
    defaultTheme: parsed.default_theme === 'dark' ? 'dark' : 'light',
    showDemos:    parsed.show_demos    !== false,
    showHeadshot: parsed.show_headshot !== false,
    experience:   Array.isArray(parsed.experience) ? parsed.experience : [],
    projects:     (parsed.projects && typeof parsed.projects === 'object') ? parsed.projects : {},
  };
} catch (err) {
  // YAML parse failure — show a readable error without using innerHTML on user data.
  // err.message comes from the JS YAML library, not from user-supplied YAML content,
  // so it is safe to display. We still use DOM APIs to be consistent.
  const wrap = document.createElement('div');
  wrap.style.cssText = 'font-family:monospace;padding:32px;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;margin:32px';
  const heading = document.createElement('strong');
  heading.textContent = 'Failed to parse resume YAML:';
  const br1 = document.createElement('br');
  const msg = document.createTextNode(err.message);
  const br2 = document.createElement('br'); br2.appendChild(document.createElement('br'));
  const hint = document.createElement('small');
  hint.textContent = 'Check the <script type="text/yaml"> block for syntax errors.';
  wrap.appendChild(heading);
  wrap.appendChild(br1);
  wrap.appendChild(msg);
  wrap.appendChild(br2);
  wrap.appendChild(hint);
  document.body.replaceChildren(wrap);
  throw err;
}

/* ── STATE — local to IIFE, never on window ── */
let activeFilt = 'All';

/* ── ICONS (static SVG strings used only in trusted DOM property assignments) ── */
// These are hardcoded markup strings with no user data — safe to keep as strings
// and assign via .innerHTML on freshly-created elements that hold no prior content.
const ICONS = {
  mail: '<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>',
  li:   '<svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>',
  gh:   '<svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>',
  blog:   '<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
  resume: '<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>',
};

/* ── HELPERS ── */

// Creates an <a> sidebar link entirely via DOM API — no innerHTML for user data.
function makeSbLink(href, label, iconKey, extraAttrs) {
  const a = document.createElement('a');
  a.href      = href;
  a.className = 'sb-link';
  // Set the icon (static trusted markup) on a wrapper span, not on the anchor itself,
  // to keep the user-supplied label strictly in textContent.
  const iconSpan = document.createElement('span');
  iconSpan.innerHTML = ICONS[iconKey]; // static SVG only — no user data
  const labelNode = document.createTextNode(label);
  a.appendChild(iconSpan);
  a.appendChild(labelNode);
  if (extraAttrs) {
    Object.entries(extraAttrs).forEach(([k, v]) => a.setAttribute(k, v));
  }
  return a;
}

/* ── SIDEBAR ── */
function buildSidebar() {
  const c         = D.candidate;
  const avatarEl  = document.getElementById('sb-avatar');
  const linksEl   = document.getElementById('sb-links');

  // ── Headshot ──
  if (D.showHeadshot) {
    const exts = ['jpg', 'jpeg', 'png', 'webp'];
    let found  = false;
    let failed = 0;
    exts.forEach(ext => {
      if (found) return;
      const img    = new Image();
      img.onload   = () => {
        if (!found) {
          found      = true;
          img.alt    = String(c.name ?? ''); // safe: textContent equivalent for img
          avatarEl.replaceChildren(img);     // DOM API — no innerHTML
        }
      };
      img.onerror  = () => {
        failed++;
        if (!found && failed === exts.length) {
          // No headshot found — show a text hint using CSS class + DOM nodes
          avatarEl.classList.add('placeholder');
          const hint = document.createElement('span');
          hint.className   = 'avatar-hint';
          hint.textContent = 'Add headshot.jpg or headshot.png to this folder';
          avatarEl.replaceChildren(hint);
        }
      };
      img.src = `headshot.${ext}`;
    });
  } else {
    avatarEl.classList.add('hidden'); // CSS class, not inline style
  }

  // ── Contact links — all built with DOM API, no innerHTML for user data ──
  if (c.email) {
    const url = safeUrl('mailto:' + c.email);
    if (url) linksEl.appendChild(makeSbLink(url, c.email, 'mail'));
  }
  if (c.linkedin) {
    const url = safeUrl(c.linkedin);
    if (url) linksEl.appendChild(makeSbLink(url, 'LinkedIn', 'li', { target: '_blank', rel: 'noopener noreferrer' }));
  }
  if (c.github) {
    const url = safeUrl(c.github);
    if (url) linksEl.appendChild(makeSbLink(url, 'GitHub', 'gh', { target: '_blank', rel: 'noopener noreferrer' }));
  }
  if (c.blog) {
    const url = safeUrl(c.blog);
    if (url) linksEl.appendChild(makeSbLink(url, 'Blog', 'blog', { target: '_blank', rel: 'noopener noreferrer' }));
  }
  linksEl.appendChild(makeSbLink('resume.pdf', 'Resume', 'resume', { target: '_blank', rel: 'noopener noreferrer' }));

  // ── Sidebar nav ──
  const nav = document.getElementById('sb-nav-items');
  D.experience.forEach((exp, i) => {
    // <button> instead of <div> — natively focusable and keyboard-activatable
    const btn = document.createElement('button');
    btn.className  = 'nav-item' + (i === 0 ? ' active' : '');
    btn.setAttribute('role', 'listitem');
    btn.setAttribute('aria-current', i === 0 ? 'true' : 'false');
    btn.setAttribute('aria-label', String(exp.title ?? '') + ' at ' + String(exp.company ?? ''));

    const dot     = document.createElement('span');
    dot.className = 'nav-dot';
    dot.setAttribute('aria-hidden', 'true');

    const wrap    = document.createElement('span');

    const titleEl       = document.createElement('span');
    titleEl.className   = 'nav-job-title';
    titleEl.textContent = String(exp.title ?? '');

    const compEl        = document.createElement('span');
    compEl.className    = 'nav-company';
    compEl.textContent  = String(exp.company ?? '');

    wrap.appendChild(titleEl);
    wrap.appendChild(document.createElement('br'));
    wrap.appendChild(compEl);

    btn.appendChild(dot);
    btn.appendChild(wrap);
    btn.addEventListener('click', () => {
      const card = document.getElementById('exp-' + String(exp.id ?? i));
      if (!card) return;
      document.querySelectorAll('.exp-card.expanded').forEach(c => {
        c.classList.remove('expanded');
        c.setAttribute('aria-expanded', 'false');
      });
      card.classList.add('expanded');
      card.setAttribute('aria-expanded', 'true');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      updateSidebarActive(i);
    });
    nav.appendChild(btn);
  });

  // ── Demos button — use hidden attribute, not inline style ──
  if (D.showDemos) {
    document.getElementById('sb-bottom').removeAttribute('hidden');
  }
}

function updateSidebarActive(index) {
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
    el.setAttribute('aria-current', String(i === index));
  });
}

/* ── HERO ── */
function buildHero() {
  const c = D.candidate;
  document.getElementById('hero-ghost').textContent = String(c.name ?? '');
  document.getElementById('hero-name').textContent  = String(c.name ?? '');
  document.getElementById('hero-desc').textContent  = String(c.description ?? '');
  document.title = String(c.name ?? '') + ' — ' + String(c.description ?? '');
}

/* ── EXPERIENCE ── */
const GLOWS = [
  'rgba(45,122,79,.13)', 'rgba(78,205,196,.09)', 'rgba(139,92,246,.09)',
  'rgba(59,130,246,.09)', 'rgba(5,150,105,.09)',  'rgba(244,63,94,.09)',
  'rgba(234,88,12,.09)',
];

function renderExperience() {
  const list = document.getElementById('exp-list');
  list.replaceChildren();

  D.experience.forEach((exp, i) => {
    const jobId    = String(exp.id ?? i);
    const projects = Array.isArray(D.projects[jobId]) ? D.projects[jobId] : [];

    const card = document.createElement('div');
    card.className  = 'exp-card';
    card.id         = 'exp-' + jobId;
    card.setAttribute('role', 'listitem');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-expanded', 'false');
    card.setAttribute('aria-label', String(exp.title ?? '') + ' at ' + String(exp.company ?? ''));
    card.style.backgroundImage = `radial-gradient(ellipse 75% 75% at 95% 5%,${GLOWS[i % GLOWS.length]} 0%,transparent 65%)`;

    // Header (always visible)
    const header = document.createElement('div');
    header.className = 'exp-header';

    const left = document.createElement('div');

    const badge = document.createElement('div');
    badge.className   = 'badge';
    badge.textContent = String(exp.period ?? '');

    const titleEl = document.createElement('div');
    titleEl.className   = 'c-title';
    titleEl.textContent = String(exp.title ?? '');

    const compEl = document.createElement('div');
    compEl.className   = 'c-company';
    compEl.textContent = String(exp.company ?? '');

    left.appendChild(badge);
    left.appendChild(titleEl);
    left.appendChild(compEl);

    const toggle = document.createElement('span');
    toggle.className   = 'exp-toggle';
    toggle.textContent = '▾';
    toggle.setAttribute('aria-hidden', 'true');

    header.appendChild(left);
    header.appendChild(toggle);

    // Body (collapsed by default)
    const body = document.createElement('div');
    body.className = 'exp-body';

    const desc = document.createElement('p');
    desc.className   = 'c-desc';
    desc.textContent = String(exp.description ?? '');
    body.appendChild(desc);

    if (projects.length > 0) {
      const projSec = document.createElement('div');
      projSec.className = 'exp-projects';

      const label = document.createElement('div');
      label.className   = 'exp-proj-label';
      label.textContent = 'Projects';
      projSec.appendChild(label);

      renderProjectCards(projSec, projects);
      body.appendChild(projSec);
    }

    card.appendChild(header);
    card.appendChild(body);

    const toggle_handler = () => {
      const isExpanded = card.classList.toggle('expanded');
      card.setAttribute('aria-expanded', String(isExpanded));
      if (isExpanded) updateSidebarActive(i);
    };

    card.addEventListener('click', toggle_handler);
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle_handler(); }
    });

    list.appendChild(card);
  });
}

/* ── PROJECTS ── */

function renderProjectCards(container, projects, filterCat) {
  const filtered = !filterCat || filterCat === 'All'
    ? projects
    : projects.filter(p => String(p.cat ?? '') === filterCat);

  container.querySelectorAll('.proj-card').forEach(c => c.remove());

  filtered.forEach(p => {
    const safeCat   = String(p.cat   ?? '');
    const safeTitle = String(p.title ?? '');

    const card = document.createElement('div');
    card.className = 'proj-card';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-expanded', 'false');
    card.setAttribute('aria-label', safeTitle + (safeCat ? ' — ' + safeCat : ''));

    const catEl       = document.createElement('div');
    catEl.className   = 'proj-cat';
    catEl.textContent = safeCat;
    catEl.setAttribute('aria-hidden', 'true');

    const nameEl       = document.createElement('div');
    nameEl.className   = 'proj-name';
    nameEl.textContent = safeTitle;
    nameEl.setAttribute('aria-hidden', 'true');

    const arrow       = document.createElement('span');
    arrow.className   = 'proj-arrow';
    arrow.textContent = '▾';
    arrow.setAttribute('aria-hidden', 'true');

    const body = document.createElement('div');
    body.className = 'proj-body';

    const descEl       = document.createElement('p');
    descEl.className   = 'proj-body-desc';
    descEl.textContent = String(p.desc ?? '');
    body.appendChild(descEl);

    const url = safeUrl(p.url ?? '');
    if (url) {
      const link = document.createElement('a');
      link.href      = url;
      link.className = 'proj-body-link';
      link.target    = '_blank';
      link.rel       = 'noopener noreferrer';
      link.textContent = 'View on GitHub →';
      link.addEventListener('click', e => e.stopPropagation());
      body.appendChild(link);
    }

    card.appendChild(catEl);
    card.appendChild(nameEl);
    card.appendChild(arrow);
    card.appendChild(body);

    const toggle_handler = (e) => {
      e.stopPropagation();
      const isExpanded = card.classList.toggle('expanded');
      card.setAttribute('aria-expanded', String(isExpanded));
    };

    card.addEventListener('click', toggle_handler);
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle_handler(e); }
    });

    container.appendChild(card);
  });
}

function renderProjects() {
  const allProjects = D.experience.flatMap(exp => {
    const jobId = String(exp.id ?? '');
    return Array.isArray(D.projects[jobId]) ? D.projects[jobId] : [];
  });
  activeFilt = 'All';

  const cats = ['All', ...new Set(allProjects.map(p => String(p.cat ?? '')).filter(Boolean))];
  const fb   = document.getElementById('filter-bar');
  const grid = document.getElementById('proj-grid');
  fb.replaceChildren();

  cats.forEach(cat => {
    const b = document.createElement('button');
    b.className   = 'f-btn' + (cat === 'All' ? ' on' : '');
    b.textContent = cat;
    b.setAttribute('aria-pressed', String(cat === 'All'));
    b.addEventListener('click', () => {
      activeFilt = cat;
      fb.querySelectorAll('.f-btn').forEach(x => {
        const isActive = x.textContent === cat;
        x.classList.toggle('on', isActive);
        x.setAttribute('aria-pressed', String(isActive));
      });
      renderProjectCards(grid, allProjects, activeFilt);
    });
    fb.appendChild(b);
  });

  renderProjectCards(grid, allProjects, 'All');
}

/* ── THEME TOGGLE ── */
const toggleBtn = document.getElementById('theme-toggle');
// URL param (from return link on demos.html) takes priority; fall back to YAML default_theme
const _urlTheme = new URLSearchParams(window.location.search).get('theme');
let isDark = _urlTheme ? _urlTheme === 'dark' : D.defaultTheme === 'dark';

function applyTheme() {
  document.body.classList.toggle('dark', isDark);
  toggleBtn.textContent = isDark ? '☀️' : '🌙';
  toggleBtn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
  // Sync the demos pill href so it carries the theme across pages
  const pill = document.querySelector('.demos-pill');
  if (pill) pill.href = 'demos.html?theme=' + (isDark ? 'dark' : 'light');
}

applyTheme(); // apply on load

toggleBtn.addEventListener('click', () => {
  isDark = !isDark;
  applyTheme();
});

/* ── DEMOS SHAKE ── */
const demosPill = document.querySelector('.demos-pill');
if (demosPill) {
  const triggerShake = () => {
    demosPill.classList.add('shaking');
    demosPill.addEventListener('animationend', () => demosPill.classList.remove('shaking'), { once: true });
    setTimeout(triggerShake, 2000 + Math.random() * 3000);
  };
  setTimeout(triggerShake, 2000 + Math.random() * 3000);
}

/* ── INIT ── */
buildSidebar();
buildHero();
renderExperience();
renderProjects();

})();
</script>
